        </nav>

    <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-16 flex-grow w-full animate-fade-in">
        <h1 class="text-4xl font-extrabold tracking-tighter text-white mb-6 uppercase">Initiate Contact</h1>
        
        <form id="contact-form" class="bg-neutral-900 border border-neutral-800 p-8 rounded-sm">
            <div class="mb-6">
                <label class="block text-neutral-400 text-sm font-bold uppercase tracking-widest mb-2" for="name">ID / Name</label>
                <input class="w-full bg-neutral-950 border border-neutral-700 text-white px-4 py-3 rounded-sm focus:outline-none focus:border-amber-600 transition-colors" type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="mb-6">
                <label class="block text-neutral-400 text-sm font-bold uppercase tracking-widest mb-2" for="email">Comms / Email</label>
                <input class="w-full bg-neutral-950 border border-neutral-700 text-white px-4 py-3 rounded-sm focus:outline-none focus:border-amber-600 transition-colors" type="email" id="email" placeholder="john@example.com" required>
            </div>
            <div class="mb-6">
                <label class="block text-neutral-400 text-sm font-bold uppercase tracking-widest mb-2" for="work-type">Type of Work Needed</label>
                <select id="work-type" class="w-full bg-neutral-950 border border-neutral-700 text-white px-4 py-3 rounded-sm focus:outline-none focus:border-amber-600 transition-colors" required>
                    <option value="" disabled selected>Select specific division</option>
                    <option value="Automotive / Mechanic">Automotive / Mechanic</option>
                    <option value="Structural Carpentry">Structural Carpentry</option>
                    <option value="Web Development">Web Development</option>
                    <option value="Network / Fightnet">Network / Security (Fightnet)</option>
                    <option value="Other">Other / General</option>
                </select>
            </div>
            <div class="mb-6">
                <label class="block text-neutral-400 text-sm font-bold uppercase tracking-widest mb-2" for="work-details">Scope of Work</label>
                <select id="work-details" class="w-full bg-neutral-950 border border-neutral-700 text-white px-4 py-3 rounded-sm focus:outline-none focus:border-amber-600 transition-colors" required>
                    <option value="" disabled selected>Select scope details</option>
                    <option value="General Quote Request">General Quote Request</option>
                    <option value="Urgent Assistance">Urgent Assistance Needed</option>
                    <option value="Project Evaluation">Project Evaluation / Survey</option>
                    <option value="Long Term Contract">Long Term Contract / Consulting</option>
                </select>
            </div>
            <div class="mb-8">
                <label class="block text-neutral-400 text-sm font-bold uppercase tracking-widest mb-2" for="message">Transmission</label>
                <textarea class="w-full bg-neutral-950 border border-neutral-700 text-white px-4 py-3 rounded-sm h-32 resize-none focus:outline-none focus:border-amber-600 transition-colors" id="message" placeholder="Provide additional details regarding the project..." required></textarea>
            </div>
            <button type="submit" class="w-full bg-amber-600 text-neutral-950 font-bold uppercase tracking-widest py-4 px-8 rounded-sm hover:bg-amber-500 transition-colors font-mono">Submit Data</button>
        </form>

        <script>
            document.getElementById('contact-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const workType = document.getElementById('work-type').value;
                const workDetails = document.getElementById('work-details').value;
                const message = document.getElementById('message').value;

                const subject = encodeURIComponent(`Inquiry for ${workType}: ${workDetails}`);
                const body = encodeURIComponent(
`Client Name: ${name}
Reply to: ${email}
Type of Work: ${workType}
Scope of Work: ${workDetails}

Message details:
${message}`
                );

                window.location.href = `mailto:dfbreauxjr@gmail.com?subject=${subject}&body=${body}`;
            });
        </script>
    </main>
